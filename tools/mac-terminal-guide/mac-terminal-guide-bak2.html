<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>macOS Terminal — Kommandoreferens</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">
<script>
  // Generate favicon dynamically via canvas
  (function() {
    const canvas = document.createElement('canvas');
    canvas.width = 64; canvas.height = 64;
    const ctx = canvas.getContext('2d');

    // Background — dark rounded square
    const r = 12;
    ctx.beginPath();
    ctx.moveTo(r, 0); ctx.lineTo(64-r, 0);
    ctx.quadraticCurveTo(64, 0, 64, r);
    ctx.lineTo(64, 64-r);
    ctx.quadraticCurveTo(64, 64, 64-r, 64);
    ctx.lineTo(r, 64);
    ctx.quadraticCurveTo(0, 64, 0, 64-r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.closePath();
    ctx.fillStyle = '#0a0c0f';
    ctx.fill();

    // Subtle inner glow border
    const grad = ctx.createLinearGradient(0, 0, 64, 64);
    grad.addColorStop(0, 'rgba(0,255,135,0.5)');
    grad.addColorStop(1, 'rgba(0,212,255,0.3)');
    ctx.strokeStyle = grad;
    ctx.lineWidth = 2;
    ctx.stroke();

    // Prompt symbol: green ">" 
    ctx.font = 'bold 26px "JetBrains Mono", monospace';
    ctx.fillStyle = '#00ff87';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText('>', 10, 30);

    // Cursor block — cyan blinking block
    ctx.fillStyle = '#00d4ff';
    ctx.fillRect(36, 18, 12, 22);

    // Scanline overlay — subtle green tint lines
    ctx.fillStyle = 'rgba(0,255,135,0.04)';
    for (let y = 0; y < 64; y += 4) {
      ctx.fillRect(0, y, 64, 2);
    }

    const link = document.createElement('link');
    link.rel = 'icon';
    link.type = 'image/png';
    link.href = canvas.toDataURL('image/png');
    document.head.appendChild(link);
  })();
</script>
<style>
  :root {
    --bg: #0a0c0f;
    --bg2: #0f1218;
    --bg3: #141920;
    --border: #1e2733;
    --border2: #243040;
    --green: #00ff87;
    --green2: #00cc6a;
    --cyan: #00d4ff;
    --amber: #ffb300;
    --pink: #ff4d8d;
    --purple: #a78bfa;
    --text: #c8d6e8;
    --text2: #7a90a8;
    --text3: #445566;
    --tag-bg: rgba(0,255,135,0.08);
    --tag-border: rgba(0,255,135,0.2);
    --font-mono: 'JetBrains Mono', monospace;
    --font-ui: 'Space Grotesk', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,255,135,0.012) 2px,
      rgba(0,255,135,0.012) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  /* ── HEADER ── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,12,15,0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    gap: 2rem;
    height: 64px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    flex-shrink: 0;
  }

  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--green), var(--cyan));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 14px;
    color: #000;
    letter-spacing: -1px;
  }

  .logo-text {
    font-weight: 600;
    font-size: 0.95rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text);
  }

  .logo-text span {
    color: var(--green);
  }

  .header-search {
    flex: 1;
    max-width: 480px;
    position: relative;
  }

  .header-search input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 0.55rem 1rem 0.55rem 2.5rem;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .header-search input:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(0,255,135,0.1);
  }

  .header-search input::placeholder {
    color: var(--text3);
  }

  .search-icon {
    position: absolute;
    left: 0.75rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 0.85rem;
  }

  .count-badge {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--text2);
    flex-shrink: 0;
  }

  .count-badge span {
    color: var(--green);
    font-weight: 700;
  }

  /* ── LAYOUT ── */
  .layout {
    display: grid;
    grid-template-columns: 220px 1fr;
    min-height: calc(100vh - 64px);
  }

  /* ── SIDEBAR ── */
  aside {
    position: sticky;
    top: 64px;
    height: calc(100vh - 64px);
    overflow-y: auto;
    border-right: 1px solid var(--border);
    padding: 1.5rem 0;
    background: var(--bg2);
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }

  aside::-webkit-scrollbar { width: 4px; }
  aside::-webkit-scrollbar-track { background: transparent; }
  aside::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .sidebar-label {
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
    padding: 0 1.25rem;
    margin-bottom: 0.5rem;
    margin-top: 1.25rem;
  }

  .sidebar-label:first-child { margin-top: 0; }

  .cat-btn {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    width: 100%;
    padding: 0.55rem 1.25rem;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text2);
    font-family: var(--font-ui);
    font-size: 0.82rem;
    text-align: left;
    transition: all 0.15s;
    position: relative;
  }

  .cat-btn:hover {
    color: var(--text);
    background: rgba(255,255,255,0.03);
  }

  .cat-btn.active {
    color: var(--green);
    background: rgba(0,255,135,0.06);
  }

  .cat-btn.active::before {
    content: '';
    position: absolute;
    left: 0; top: 20%; bottom: 20%;
    width: 2px;
    background: var(--green);
    border-radius: 2px;
  }

  .cat-icon { font-size: 0.9rem; }

  .cat-count {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 0.65rem;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
    color: var(--text3);
  }

  .cat-btn.active .cat-count {
    background: rgba(0,255,135,0.1);
    border-color: rgba(0,255,135,0.25);
    color: var(--green2);
  }

  /* ── MAIN ── */
  main {
    padding: 2rem;
    overflow-y: auto;
  }

  .section-header {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    margin-bottom: 1.5rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--border);
  }

  .section-title {
    font-weight: 600;
    font-size: 1.1rem;
    color: var(--text);
  }

  .section-sub {
    font-size: 0.8rem;
    color: var(--text2);
  }

  /* ── COMMAND CARDS ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 2.5rem;
  }

  .cmd-card {
    background: var(--bg2);
    padding: 1.25rem 1.5rem;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }

  .cmd-card:hover {
    background: var(--bg3);
  }

  .cmd-card.expanded {
    background: var(--bg3);
  }

  .cmd-top {
    display: flex;
    align-items: flex-start;
    gap: 1rem;
  }

  .cmd-name {
    font-family: var(--font-mono);
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--green);
    flex-shrink: 0;
    min-width: 100px;
    padding-top: 1px;
  }

  .cmd-short {
    font-size: 0.82rem;
    color: var(--text2);
    line-height: 1.5;
    flex: 1;
  }

  .cmd-expand-btn {
    margin-left: auto;
    flex-shrink: 0;
    font-size: 0.7rem;
    color: var(--text3);
    transition: transform 0.2s, color 0.15s;
  }

  .cmd-card.expanded .cmd-expand-btn {
    transform: rotate(180deg);
    color: var(--green);
  }

  .cmd-detail {
    display: none;
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
  }

  .cmd-card.expanded .cmd-detail {
    display: block;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .examples-label {
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 0.5rem;
  }

  .example-line {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    margin-bottom: 0.6rem;
  }

  .example-line:last-child { margin-bottom: 0; }

  .example-code-wrap {
    display: flex;
    align-items: center;
    gap: 0;
    background: rgba(0,212,255,0.06);
    border: 1px solid rgba(0,212,255,0.15);
    border-radius: 5px;
    flex-shrink: 0;
    max-width: 100%;
    transition: border-color 0.15s;
  }

  .example-code-wrap:hover {
    border-color: rgba(0,212,255,0.35);
  }

  .example-code-wrap.copied {
    border-color: rgba(0,255,135,0.5);
    background: rgba(0,255,135,0.07);
  }

  .example-code {
    font-family: var(--font-mono);
    font-size: 0.8rem;
    color: var(--cyan);
    padding: 0.2rem 0.5rem 0.2rem 0.6rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 280px;
  }

  .example-code-wrap.copied .example-code {
    color: var(--green);
  }

  .copy-btn {
    background: none;
    border: none;
    border-left: 1px solid rgba(0,212,255,0.15);
    cursor: pointer;
    padding: 0.2rem 0.45rem;
    color: var(--text3);
    font-size: 0.65rem;
    line-height: 1;
    transition: color 0.15s, background 0.15s;
    border-radius: 0 4px 4px 0;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    height: 100%;
  }

  .copy-btn:hover {
    color: var(--cyan);
    background: rgba(0,212,255,0.1);
  }

  .example-code-wrap.copied .copy-btn {
    color: var(--green);
    border-left-color: rgba(0,255,135,0.25);
  }

  .example-desc {
    font-size: 0.78rem;
    color: var(--text2);
    line-height: 1.5;
    padding-top: 0.15rem;
  }

  .example-line.is-separator {
    margin-top: 0.75rem;
    margin-bottom: 0.25rem;
    pointer-events: none;
  }

  .example-line.is-separator .example-code-wrap {
    background: none;
    border-color: transparent;
    cursor: default;
  }

  .example-line.is-separator .example-code {
    color: var(--text3);
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 600;
    padding-left: 0;
  }

  .example-line.is-separator .copy-btn {
    display: none;
  }

  .example-line.is-separator .example-desc {
    color: var(--text3);
    font-size: 0.72rem;
    border-bottom: 1px solid var(--border);
    flex: 1;
    padding-bottom: 0.25rem;
    align-self: flex-end;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    font-family: var(--font-mono);
    font-size: 0.6rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    padding: 2px 7px;
    border-radius: 4px;
    margin-right: 0.35rem;
    margin-top: 0.75rem;
  }

  .tag-danger { background: rgba(255,77,141,0.12); border: 1px solid rgba(255,77,141,0.25); color: var(--pink); }
  .tag-net { background: rgba(0,212,255,0.1); border: 1px solid rgba(0,212,255,0.2); color: var(--cyan); }
  .tag-sudo { background: rgba(255,179,0,0.1); border: 1px solid rgba(255,179,0,0.2); color: var(--amber); }
  .tag-safe { background: rgba(0,255,135,0.08); border: 1px solid rgba(0,255,135,0.18); color: var(--green2); }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center;
    padding: 5rem 2rem;
    color: var(--text3);
    font-family: var(--font-mono);
    font-size: 0.85rem;
  }

  .empty .big { font-size: 2rem; margin-bottom: 1rem; }

  /* ── SCROLLBAR ── */
  main::-webkit-scrollbar { width: 4px; }
  main::-webkit-scrollbar-track { background: transparent; }
  main::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  main { scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }

  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    aside { display: none; }
    .grid { grid-template-columns: 1fr; }
    header { gap: 1rem; }
    .count-badge { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">$_</div>
    <div class="logo-text">mac<span>OS</span> Terminal</div>
  </div>
  <div class="header-search">
    <span class="search-icon">⌕</span>
    <input type="text" id="searchInput" placeholder="Sök kommando eller beskrivning…" autocomplete="off">
  </div>
  <div class="count-badge">Visar <span id="visibleCount">0</span> kommandon</div>
</header>

<div class="layout">
  <aside id="sidebar">
    <div class="sidebar-label">Kategorier</div>
    <!-- generated by JS -->
  </aside>

  <main id="main">
    <!-- generated by JS -->
  </main>
</div>

<script>
const COMMANDS = [
  // ── NAVIGATION ──
  { cat: "Navigation", cmd: "pwd", short: "Visa aktuell mapp (Print Working Directory)", tags: ["safe"],
    examples: [
      { code: "pwd", desc: "Skriver ut sökvägen till mappen du befinner dig i" }
    ]
  },
  { cat: "Navigation", cmd: "ls", short: "Lista filer och mappar i aktuell katalog", tags: ["safe"],
    examples: [
      { code: "ls", desc: "Listar filer och mappar" },
      { code: "ls -la", desc: "Listar ALLT inkl. dolda filer med detaljer" },
      { code: "ls -lh", desc: "Listar med läsbar filstorlek (KB, MB)" },
      { code: "ls ~/Desktop", desc: "Listar skrivbordets innehåll" }
    ]
  },
  { cat: "Navigation", cmd: "cd", short: "Byt aktiv katalog (Change Directory)", tags: ["safe"],
    examples: [
      { code: "cd Documents", desc: "Gå in i mappen Documents" },
      { code: "cd ..", desc: "Gå upp en nivå" },
      { code: "cd ~", desc: "Gå till hemkatalogen" },
      { code: "cd /", desc: "Gå till rotkatalogen" },
      { code: "cd -", desc: "Gå tillbaka till förra katalogen" }
    ]
  },
  { cat: "Navigation", cmd: "open", short: "Öppna fil, mapp eller URL med standardprogram", tags: ["safe"],
    examples: [
      { code: "open .", desc: "Öppna aktuell mapp i Finder" },
      { code: "open fil.pdf", desc: "Öppna PDF med Preview" },
      { code: "open https://apple.com", desc: "Öppna URL i webbläsare" },
      { code: "open -a TextEdit fil.txt", desc: "Öppna med specifikt program" }
    ]
  },
  { cat: "Navigation", cmd: "find", short: "Sök efter filer och mappar i filsystemet", tags: ["safe"],
    examples: [
      { code: "find . -name '*.log'", desc: "Hitta alla .log-filer i aktuell mapp" },
      { code: "find ~ -name foto.jpg", desc: "Hitta foto.jpg i hemkatalogen" },
      { code: "find /tmp -newer file.txt", desc: "Hitta filer nyare än file.txt" }
    ]
  },

  // ── FILER & MAPPAR ──
  { cat: "Filer & Mappar", cmd: "mkdir", short: "Skapa en ny katalog (Make Directory)", tags: ["safe"],
    examples: [
      { code: "mkdir projekt", desc: "Skapar mappen 'projekt'" },
      { code: "mkdir -p a/b/c", desc: "Skapar hela sökvägen inkl. mellanliggande" }
    ]
  },
  { cat: "Filer & Mappar", cmd: "touch", short: "Skapa en tom fil eller uppdatera tidsstämpel", tags: ["safe"],
    examples: [
      { code: "touch fil.txt", desc: "Skapar en tom fil om den inte finns" },
      { code: "touch a.txt b.txt c.txt", desc: "Skapar flera filer på en gång" }
    ]
  },
  { cat: "Filer & Mappar", cmd: "cp", short: "Kopiera filer eller mappar", tags: ["safe"],
    examples: [
      { code: "cp fil.txt kopia.txt", desc: "Kopierar fil.txt till kopia.txt" },
      { code: "cp -r mapp/ nymapp/", desc: "Kopierar en hel mapp rekursivt" },
      { code: "cp *.jpg ~/Bilder/", desc: "Kopierar alla JPG till Bilder" }
    ]
  },
  { cat: "Filer & Mappar", cmd: "mv", short: "Flytta eller byta namn på filer och mappar", tags: ["safe"],
    examples: [
      { code: "mv gammal.txt ny.txt", desc: "Byter namn på filen" },
      { code: "mv fil.txt ~/Documents/", desc: "Flyttar filen till Documents" },
      { code: "mv mapp/ ~/Desktop/", desc: "Flyttar en hel mapp" }
    ]
  },
  { cat: "Filer & Mappar", cmd: "rm", short: "Ta bort filer och mappar (permanent!)", tags: ["danger"],
    examples: [
      { code: "rm fil.txt", desc: "Tar bort fil.txt permanent" },
      { code: "rm -r mapp/", desc: "Tar bort en hel mapp rekursivt" },
      { code: "rm -rf mapp/", desc: "⚠️ Forcerar borttagning utan bekräftelse" },
      { code: "rm *.tmp", desc: "Tar bort alla .tmp-filer" }
    ]
  },
  { cat: "Filer & Mappar", cmd: "ln", short: "Skapa symboliska eller hårda länkar", tags: ["safe"],
    examples: [
      { code: "ln -s /path/fil länk", desc: "Skapar en symbolisk länk (genväg)" },
      { code: "ln fil hård-länk", desc: "Skapar en hård länk till filen" }
    ]
  },
  { cat: "Filer & Mappar", cmd: "chmod", short: "Ändra filrättigheter (läs/skriv/kör)", tags: ["sudo"],
    examples: [
      { code: "chmod +x script.sh", desc: "Gör filen körbar" },
      { code: "chmod 755 fil", desc: "rwxr-xr-x — standard för skript" },
      { code: "chmod 644 fil", desc: "rw-r--r-- — standard för filer" },
      { code: "chmod -R 755 mapp/", desc: "Sätter rättigheter rekursivt" }
    ]
  },
  { cat: "Filer & Mappar", cmd: "chown", short: "Ändra ägare av fil eller mapp", tags: ["sudo"],
    examples: [
      { code: "chown user fil.txt", desc: "Sätter user som ägare" },
      { code: "sudo chown -R user:group mapp/", desc: "Ändrar ägare rekursivt" }
    ]
  },

  // ── TEXTHANTERING ──
  { cat: "Texthantering", cmd: "cat", short: "Visa innehållet i en eller flera filer", tags: ["safe"],
    examples: [
      { code: "cat fil.txt", desc: "Skriver ut hela filens innehåll" },
      { code: "cat a.txt b.txt > c.txt", desc: "Slår ihop filer till c.txt" },
      { code: "cat -n fil.txt", desc: "Visar innehållet med radnummer" }
    ]
  },
  { cat: "Texthantering", cmd: "less", short: "Bläddra i filer sida för sida (q = avsluta)", tags: ["safe"],
    examples: [
      { code: "less fil.txt", desc: "Öppnar filen för bläddring. q = avsluta, / = sök" },
      { code: "less +G fil.txt", desc: "Hoppar direkt till slutet av filen" }
    ]
  },
  { cat: "Texthantering", cmd: "head", short: "Visa de första raderna i en fil", tags: ["safe"],
    examples: [
      { code: "head fil.txt", desc: "Visar de 10 första raderna" },
      { code: "head -20 fil.txt", desc: "Visar de 20 första raderna" }
    ]
  },
  { cat: "Texthantering", cmd: "tail", short: "Visa de sista raderna i en fil", tags: ["safe"],
    examples: [
      { code: "tail fil.txt", desc: "Visar de 10 sista raderna" },
      { code: "tail -f app.log", desc: "Följer filen live (loggar m.m.)" },
      { code: "tail -50 fil.txt", desc: "Visar de 50 sista raderna" }

      { code: "curl --cert client.pem --key privkey.pem https://example.com", desc: "Använd klientcertifikat (mutual TLS)" },
      { code: "curl -w '%{ssl_verify_result}\\n' -o /dev/null -s https://example.com", desc: "Visa TLS-verifieringsresultat (0 = OK)" }
    ]
  },
  { cat: "Certifikat & PKI", cmd: "nmap (TLS-skanning)", short: "Skanna TLS-konfiguration och certifikat med nmap", tags: ["net"],
    examples: [
      { code: "nmap --script ssl-cert -p 443 example.com", desc: "Hämta och visa certifikatinfo" },
      { code: "nmap --script ssl-enum-ciphers -p 443 example.com", desc: "Lista alla stödda TLS-cipher suites" },
      { code: "nmap --script ssl-dh-params -p 443 example.com", desc: "Kontrollera Diffie-Hellman-parametrar (Logjam)" },
      { code: "nmap --script tls-alpn -p 443 example.com", desc: "Visa stödda ALPN-protokoll (HTTP/2 m.m.)" }
    ]
  },
  { cat: "Certifikat & PKI", cmd: "dig (DANE / TLSA)", short: "Kontrollera DNS-baserade certifikatposter", tags: ["net"],
    examples: [
      { code: "dig example.com A +short", desc: "Slå upp IP-adress för domänen" },
      { code: "dig _443._tcp.example.com TLSA", desc: "Hämta DANE TLSA-post (certifikatpinning i DNS)" },
      { code: "dig example.com CAA", desc: "Visa CAA-poster (vilka CA:er får utfärda cert)" },
      { code: "dig _dmarc.example.com TXT", desc: "Kontrollera DMARC-post" },
      { code: "dig example.com +dnssec", desc: "Visa DNSSEC-information" }
    ]
  },
  { cat: "Certifikat & PKI", cmd: "openssl ocsp", short: "Kontrollera om ett certifikat är återkallat via OCSP", tags: ["net"],
    examples: [
      { code: "openssl ocsp -issuer ca.pem -cert cert.pem -url http://ocsp.example.com -resp_text", desc: "Kontrollera certifikatsstatus via OCSP" },
      { code: "openssl x509 -in cert.pem -noout -ocsp_uri", desc: "Hämta OCSP-URL:en från certifikatet" }
    ]
  },
  { cat: "Certifikat & PKI", cmd: "step (smallstep CLI)", short: "Modernt CLI-verktyg för PKI, certifikat och JWT", tags: ["safe"],
    examples: [
      { code: "brew install step", desc: "Installerar step CLI (brew)" },
      { code: "step certificate inspect cert.pem", desc: "Visa certifikatinfo i läsbart format" },
      { code: "step certificate inspect https://example.com", desc: "Inspektera certifikat direkt från URL" },
      { code: "step certificate verify cert.pem --roots ca.pem", desc: "Verifiera certifikat mot CA" },
      { code: "step certificate create 'Min CA' ca.crt ca.key --profile root-ca", desc: "Skapa en lokal rot-CA" },
      { code: "step certificate create example.com cert.crt cert.key --ca ca.crt --ca-key ca.key", desc: "Utfärda ett certifikat signerat av din CA" }
    ]
  },
];

// ── SETUP ──
const categories = [...new Set(COMMANDS.map(c => c.cat))];
const TAG_LABELS = { danger: '⚠ Farligt', net: '⬡ Nätverk', sudo: '⬆ Root', safe: '✔ Säkert' };

let activeCategory = 'Alla';
let searchQuery = '';

function tagHtml(tags) {
  return (tags||[]).map(t => `<span class="tag tag-${t}">${TAG_LABELS[t]||t}</span>`).join('');
}

function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  const allCount = COMMANDS.length;
  let html = `<button class="cat-btn ${activeCategory==='Alla'?'active':''}" onclick="setCategory('Alla')">
    <span class="cat-icon">◈</span> Alla kommandon
    <span class="cat-count">${allCount}</span>
  </button>`;

  categories.forEach(cat => {
    const count = COMMANDS.filter(c => c.cat === cat).length;
    const icons = { 'Navigation':'⌘','Filer & Mappar':'⊞','Texthantering':'⊟','Processer':'⊛','Nätverk':'⊕','System':'⊙','Pakethanterare':'⊡','Git':'⊢','Pipes & Omdirigering':'⊣','Shell-tricks':'⊤','Telnet & Fjärranslutning':'⊥','Disk & Lagring':'⊦','Felsökning':'⊧','Säkerhet & Kryptering':'⊨','Komprimering & Arkiv':'⊩','Skript & Automatisering':'⊪','Användare & Grupper':'⊫','Prestanda & Benchmarking':'⊬','Avancerad Text':'⊭','Xcode & Utvecklarverktyg':'⊮','Miljö & Shell-konfiguration':'⊯','Miljö & Shell':'⊯','Versionshantering':'⊰','Media & Bilder':'⊱','Certifikat & PKI':'⊲' };
    const icon = icons[cat] || '◆';
    html += `<button class="cat-btn ${activeCategory===cat?'active':''}" onclick="setCategory('${cat}')">
      <span class="cat-icon">${icon}</span> ${cat}
      <span class="cat-count">${count}</span>
    </button>`;
  });

  sidebar.innerHTML = html;
}

function filteredCommands() {
  return COMMANDS.filter(c => {
    const matchCat = activeCategory === 'Alla' || c.cat === activeCategory;
    const q = searchQuery.toLowerCase();
    const matchSearch = !q || c.cmd.toLowerCase().includes(q) || c.short.toLowerCase().includes(q) ||
      (c.examples||[]).some(e => e.code.toLowerCase().includes(q) || e.desc.toLowerCase().includes(q));
    return matchCat && matchSearch;
  });
}

function renderMain() {
  const main = document.getElementById('main');
  const cmds = filteredCommands();
  document.getElementById('visibleCount').textContent = cmds.length;

  if (cmds.length === 0) {
    main.innerHTML = `<div class="empty"><div class="big">◌</div>Inga kommandon hittades för "${searchQuery}"</div>`;
    return;
  }

  // Group by category
  const groups = {};
  cmds.forEach(c => {
    if (!groups[c.cat]) groups[c.cat] = [];
    groups[c.cat].push(c);
  });

  let html = '';
  Object.entries(groups).forEach(([cat, cmds]) => {
    html += `<div class="section-header">
      <span class="section-title">${cat}</span>
      <span class="section-sub">${cmds.length} kommando${cmds.length!==1?'n':''}</span>
    </div>
    <div class="grid">`;

    cmds.forEach(c => {
      const exHtml = (c.examples||[]).map(e => {
        const isSep = e.desc.startsWith('──');
        const escaped = e.code.replace(/'/g, "\\'").replace(/"/g, '&quot;');
        if (isSep) {
          return `<div class="example-line is-separator">
            <div class="example-code-wrap">
              <span class="example-code">${e.code}</span>
              <button class="copy-btn" style="display:none">⎘</button>
            </div>
            <span class="example-desc">${e.desc}</span>
          </div>`;
        }
        return `<div class="example-line">
          <div class="example-code-wrap" id="">
            <span class="example-code" title="${escaped}">${e.code}</span>
            <button class="copy-btn" onclick="copyCode(event, '${escaped}')" title="Kopiera">⎘</button>
          </div>
          <span class="example-desc">${e.desc}</span>
        </div>`;
      }).join('');

      html += `<div class="cmd-card" onclick="toggleCard(this)">
        <div class="cmd-top">
          <span class="cmd-name">${c.cmd}</span>
          <span class="cmd-short">${c.short}</span>
          <span class="cmd-expand-btn">▾</span>
        </div>
        <div class="cmd-detail">
          <div class="examples-label">Exempel</div>
          ${exHtml}
          ${tagHtml(c.tags)}
        </div>
      </div>`;
    });

    html += '</div>';
  });

  main.innerHTML = html;
}

function toggleCard(el) {
  el.classList.toggle('expanded');
}

function copyCode(event, code) {
  event.stopPropagation();
  const wrap = event.currentTarget.closest('.example-code-wrap');
  const btn = event.currentTarget;
  navigator.clipboard.writeText(code).then(() => {
    wrap.classList.add('copied');
    btn.textContent = '✓';
    setTimeout(() => {
      wrap.classList.remove('copied');
      btn.textContent = '⎘';
    }, 1500);
  }).catch(() => {
    // Fallback for older browsers
    const ta = document.createElement('textarea');
    ta.value = code;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    wrap.classList.add('copied');
    btn.textContent = '✓';
    setTimeout(() => {
      wrap.classList.remove('copied');
      btn.textContent = '⎘';
    }, 1500);
  });
}

function setCategory(cat) {
  activeCategory = cat;
  renderSidebar();
  renderMain();
  document.querySelector('main').scrollTop = 0;
}

document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value;
  if (searchQuery) activeCategory = 'Alla';
  renderSidebar();
  renderMain();
});

// Init
renderSidebar();
renderMain();
</script>
</body>
</html>
