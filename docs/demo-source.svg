<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d57bf"/>
      <stop offset="55%" stop-color="#2b63cf"/>
      <stop offset="100%" stop-color="#3d73de"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="20" stdDeviation="28" flood-color="#173773" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1200" height="780" fill="#eef2fa"/>

  <g filter="url(#shadow)">
    <rect x="54" y="48" width="1092" height="684" rx="24" fill="url(#bg)"/>
    <rect x="54" y="48" width="1092" height="52" rx="24" fill="#d8d2ea"/>
    <rect x="54" y="76" width="1092" height="24" fill="#d8d2ea"/>
