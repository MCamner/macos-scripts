    <text x="82" y="276" fill="#ffffff" font-family="Menlo, Monaco, Consolas, monospace" font-size="22"> 4. Spotify</text>
    <text x="500" y="276" fill="#ffffff" font-family="Menlo, Monaco, Consolas, monospace" font-size="20"> 5. Xcode</text>
    <text x="82" y="316" fill="#ffffff" font-family="Menlo, Monaco, Consolas, monospace" font-size="22"> 7. Activity Monitor</text>
    <text x="500" y="316" fill="#ffffff" font-family="Menlo, Monaco, Consolas, monospace" font-size="20"> 6. System Settings</text>

    <text x="82" y="382" fill="#ffffff" font-family="Menlo, Monaco, Consolas, monospace" font-size="24">SYSTEM / CONTROL</text>
    <text x="82" y="422" fill="#ffffff" font-family="Menlo, Monaco, Consolas, monospace" font-size="22"> 8. Downloads folder</text>
    <text x="500" y="422" fill="#ffffff" font-family="Menlo, Monaco, Consolas, monospace" font-size="20"> 9. Home folder</text>
    <text x="82" y="462" fill="#ffffff" font-family="Menlo, Monaco, Consolas, monospace" font-size="22">11. Git Menu</text>
    <text x="500" y="462" fill="#ffffff" font-family="Menlo, Monaco, Consolas, monospace" font-size="20">10. Show IP + network</text>
    <text x="82" y="502" fill="#ffffff" font-family="Menlo, Monaco, Consolas, monospace" font-size="22">12. Lock screen</text>
    <text x="500" y="502" fill="#ffffff" font-family="Menlo, Monaco, Consolas, monospace" font-size="20">13. Sleep display</text>

    <text x="82" y="568" fill="#ffffff" font-family="Menlo, Monaco, Consolas, monospace" font-size="24">WORKFLOWS</text>
    <text x="82" y="608" fill="#ffffff" font-family="Menlo, Monaco, Consolas, monospace" font-size="22">23. Performance</text>
