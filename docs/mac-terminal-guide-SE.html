<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>macOS Terminal — Kommandoreferens</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">
<script>
  // Generate favicon dynamically via canvas
  (function() {
    const canvas = document.createElement('canvas');
    canvas.width = 64; canvas.height = 64;
    const ctx = canvas.getContext('2d');

    // Background — dark rounded square
    const r = 12;
    ctx.beginPath();
    ctx.moveTo(r, 0); ctx.lineTo(64-r, 0);
    ctx.quadraticCurveTo(64, 0, 64, r);
    ctx.lineTo(64, 64-r);
    ctx.quadraticCurveTo(64, 64, 64-r, 64);
    ctx.lineTo(r, 64);
    ctx.quadraticCurveTo(0, 64, 0, 64-r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.closePath();
    ctx.fillStyle = '#0a0c0f';
    ctx.fill();

    // Subtle inner glow border
    const grad = ctx.createLinearGradient(0, 0, 64, 64);
    grad.addColorStop(0, 'rgba(0,255,135,0.5)');
    grad.addColorStop(1, 'rgba(0,212,255,0.3)');
    ctx.strokeStyle = grad;
    ctx.lineWidth = 2;
    ctx.stroke();

    // Prompt symbol: green ">" 
    ctx.font = 'bold 26px "JetBrains Mono", monospace';
    ctx.fillStyle = '#00ff87';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText('>', 10, 30);

    // Cursor block — cyan blinking block
    ctx.fillStyle = '#00d4ff';
    ctx.fillRect(36, 18, 12, 22);

    // Scanline overlay — subtle green tint lines
    ctx.fillStyle = 'rgba(0,255,135,0.04)';
    for (let y = 0; y < 64; y += 4) {
      ctx.fillRect(0, y, 64, 2);
    }

    const link = document.createElement('link');
    link.rel = 'icon';
    link.type = 'image/png';
    link.href = canvas.toDataURL('image/png');
    document.head.appendChild(link);
  })();
</script>
<style>
  :root {
    --bg: #0a0c0f;
    --bg2: #0f1218;
    --bg3: #141920;
    --border: #1e2733;
    --border2: #243040;
    --green: #00ff87;
    --green2: #00cc6a;
    --cyan: #00d4ff;
    --amber: #ffb300;
    --pink: #ff4d8d;
    --purple: #a78bfa;
    --text: #c8d6e8;
    --text2: #7a90a8;
    --text3: #445566;
    --tag-bg: rgba(0,255,135,0.08);
    --tag-border: rgba(0,255,135,0.2);
    --font-mono: 'JetBrains Mono', monospace;
    --font-ui: 'Space Grotesk', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,255,135,0.012) 2px,
      rgba(0,255,135,0.012) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  /* ── HEADER ── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,12,15,0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    gap: 2rem;
    height: 64px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    flex-shrink: 0;
  }

  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--green), var(--cyan));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 14px;
    color: #000;
    letter-spacing: -1px;
  }

  .logo-text {
    font-weight: 600;
    font-size: 0.95rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text);
  }

  .logo-text span {
    color: var(--green);
  }

  .header-search {
    flex: 1;
    max-width: 480px;
    position: relative;
  }

  .header-search input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 0.55rem 1rem 0.55rem 2.5rem;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .header-search input:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(0,255,135,0.1);
  }

  .header-search input::placeholder {
    color: var(--text3);
  }

  .search-icon {
    position: absolute;
    left: 0.75rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 0.85rem;
  }

  .count-badge {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--text2);
    flex-shrink: 0;
  }

  .count-badge span {
    color: var(--green);
    font-weight: 700;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-left: auto;
    flex-shrink: 0;
  }

  .lang-switch {
    display: inline-flex;
    align-items: center;
    gap: 0.2rem;
    padding: 0.18rem;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 999px;
  }

  .lang-btn {
    background: transparent;
    border: none;
    color: var(--text2);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    font-weight: 700;
    padding: 0.28rem 0.6rem;
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }

  .lang-btn:hover {
    color: var(--text);
  }

  .lang-btn.active {
    background: rgba(0,255,135,0.12);
    color: var(--green);
  }

  /* ── LAYOUT ── */
  .layout {
    display: grid;
    grid-template-columns: 220px 1fr;
    min-height: calc(100vh - 64px);
  }

  /* ── SIDEBAR ── */
  aside {
    position: sticky;
    top: 64px;
    height: calc(100vh - 64px);
    overflow-y: auto;
    border-right: 1px solid var(--border);
    padding: 1.5rem 0;
    background: var(--bg2);
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }

  aside::-webkit-scrollbar { width: 4px; }
  aside::-webkit-scrollbar-track { background: transparent; }
  aside::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .sidebar-label {
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
    padding: 0 1.25rem;
    margin-bottom: 0.5rem;
    margin-top: 1.25rem;
  }

  .sidebar-label:first-child { margin-top: 0; }

  .cat-btn {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    width: 100%;
    padding: 0.55rem 1.25rem;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text2);
    font-family: var(--font-ui);
    font-size: 0.82rem;
    text-align: left;
    transition: all 0.15s;
    position: relative;
  }

  .cat-btn:hover {
    color: var(--text);
    background: rgba(255,255,255,0.03);
  }

  .cat-btn.active {
    color: var(--green);
    background: rgba(0,255,135,0.06);
  }

  .cat-btn.active::before {
    content: '';
    position: absolute;
    left: 0; top: 20%; bottom: 20%;
    width: 2px;
    background: var(--green);
    border-radius: 2px;
  }

  .cat-icon { font-size: 0.9rem; }

  .cat-count {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 0.65rem;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
    color: var(--text3);
  }

  .cat-btn.active .cat-count {
    background: rgba(0,255,135,0.1);
    border-color: rgba(0,255,135,0.25);
    color: var(--green2);
  }

  /* ── MAIN ── */
  main {
    padding: 2rem;
    overflow-y: auto;
  }

  .section-header {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    margin-bottom: 1.5rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--border);
  }

  .section-title {
    font-weight: 600;
    font-size: 1.1rem;
    color: var(--text);
  }

  .section-sub {
    font-size: 0.8rem;
    color: var(--text2);
  }

  /* ── COMMAND CARDS ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 2.5rem;
  }

  .cmd-card {
    background: var(--bg2);
    padding: 1.25rem 1.5rem;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }

  .cmd-card:hover {
    background: var(--bg3);
  }

  .cmd-card.expanded {
    background: var(--bg3);
  }

  .cmd-top {
    display: flex;
    align-items: flex-start;
    gap: 1rem;
  }

  .cmd-name {
    font-family: var(--font-mono);
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--green);
    flex-shrink: 0;
    min-width: 100px;
    padding-top: 1px;
  }

  .cmd-short {
    font-size: 0.82rem;
    color: var(--text2);
    line-height: 1.5;
    flex: 1;
  }

  .cmd-expand-btn {
    margin-left: auto;
    flex-shrink: 0;
    font-size: 0.7rem;
    color: var(--text3);
    transition: transform 0.2s, color 0.15s;
  }

  .cmd-card.expanded .cmd-expand-btn {
    transform: rotate(180deg);
    color: var(--green);
  }

  .cmd-detail {
    display: none;
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
  }

  .cmd-card.expanded .cmd-detail {
    display: block;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .examples-label {
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 0.5rem;
  }

  .example-line {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    margin-bottom: 0.6rem;
  }

  .example-line:last-child { margin-bottom: 0; }

  .example-code-wrap {
    display: flex;
    align-items: center;
    gap: 0;
    background: rgba(0,212,255,0.06);
    border: 1px solid rgba(0,212,255,0.15);
    border-radius: 5px;
    flex-shrink: 0;
    max-width: 100%;
    transition: border-color 0.15s;
  }

  .example-code-wrap:hover {
    border-color: rgba(0,212,255,0.35);
  }

  .example-code-wrap.copied {
    border-color: rgba(0,255,135,0.5);
    background: rgba(0,255,135,0.07);
  }

  .example-code {
    font-family: var(--font-mono);
    font-size: 0.8rem;
    color: var(--cyan);
    padding: 0.2rem 0.5rem 0.2rem 0.6rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 280px;
  }

  .example-code-wrap.copied .example-code {
    color: var(--green);
  }

  .copy-btn {
    background: none;
    border: none;
    border-left: 1px solid rgba(0,212,255,0.15);
    cursor: pointer;
    padding: 0.2rem 0.45rem;
    color: var(--text3);
    font-size: 0.65rem;
    line-height: 1;
    transition: color 0.15s, background 0.15s;
    border-radius: 0 4px 4px 0;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    height: 100%;
  }

  .copy-btn:hover {
    color: var(--cyan);
    background: rgba(0,212,255,0.1);
  }

  .example-code-wrap.copied .copy-btn {
    color: var(--green);
    border-left-color: rgba(0,255,135,0.25);
  }

  .example-desc {
    font-size: 0.78rem;
    color: var(--text2);
    line-height: 1.5;
    padding-top: 0.15rem;
  }

  .example-line.is-separator {
    margin-top: 0.75rem;
    margin-bottom: 0.25rem;
    pointer-events: none;
  }

  .example-line.is-separator .example-code-wrap {
    background: none;
    border-color: transparent;
    cursor: default;
  }

  .example-line.is-separator .example-code {
    color: var(--text3);
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 600;
    padding-left: 0;
  }

  .example-line.is-separator .copy-btn {
    display: none;
  }

  .example-line.is-separator .example-desc {
    color: var(--text3);
    font-size: 0.72rem;
    border-bottom: 1px solid var(--border);
    flex: 1;
    padding-bottom: 0.25rem;
    align-self: flex-end;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    font-family: var(--font-mono);
    font-size: 0.6rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    padding: 2px 7px;
    border-radius: 4px;
    margin-right: 0.35rem;
    margin-top: 0.75rem;
  }

  .tag-danger { background: rgba(255,77,141,0.12); border: 1px solid rgba(255,77,141,0.25); color: var(--pink); }
  .tag-net { background: rgba(0,212,255,0.1); border: 1px solid rgba(0,212,255,0.2); color: var(--cyan); }
  .tag-sudo { background: rgba(255,179,0,0.1); border: 1px solid rgba(255,179,0,0.2); color: var(--amber); }
  .tag-safe { background: rgba(0,255,135,0.08); border: 1px solid rgba(0,255,135,0.18); color: var(--green2); }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center;
    padding: 5rem 2rem;
    color: var(--text3);
    font-family: var(--font-mono);
    font-size: 0.85rem;
  }

  .empty .big { font-size: 2rem; margin-bottom: 1rem; }

  /* ── SPECIAL PANELS ── */
  .panel {
    padding: 2rem;
    max-width: 900px;
  }

  .panel-title {
    font-size: 1.3rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 0.35rem;
  }

  .panel-sub {
    font-size: 0.85rem;
    color: var(--text2);
    margin-bottom: 2rem;
    line-height: 1.6;
  }

  /* Brew install block */
  .brew-block {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 1.5rem;
  }

  .brew-block-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.75rem 1.25rem;
    border-bottom: 1px solid var(--border);
    background: var(--bg3);
  }

  .brew-block-title {
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text2);
  }

  .brew-block-title span { color: var(--green); }

  .brew-copy-btn {
    background: rgba(0,255,135,0.08);
    border: 1px solid rgba(0,255,135,0.2);
    border-radius: 6px;
    color: var(--green2);
    font-family: var(--font-mono);
    font-size: 0.7rem;
    padding: 0.25rem 0.75rem;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }

  .brew-copy-btn:hover { background: rgba(0,255,135,0.15); color: var(--green); }
  .brew-copy-btn.copied { background: rgba(0,255,135,0.2); color: var(--green); }

  .brew-code {
    font-family: var(--font-mono);
    font-size: 0.82rem;
    color: var(--cyan);
    padding: 1.25rem 1.5rem;
    white-space: pre-wrap;
    word-break: break-all;
    line-height: 1.8;
  }

  .brew-code .comment { color: var(--text3); }
  .brew-code .cmd-keyword { color: var(--green); }
  .brew-code .pkg { color: var(--amber); }

  /* Install grid */
  .install-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 1.5rem;
  }

  .install-item {
    background: var(--bg2);
    padding: 1rem 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
  }

  .install-item-top {
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .install-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-builtin { background: var(--green); }
  .dot-brew { background: var(--amber); }
  .dot-xcode { background: var(--cyan); }

  .install-name {
    font-family: var(--font-mono);
    font-size: 0.82rem;
    color: var(--text);
    font-weight: 600;
  }

  .install-desc {
    font-size: 0.75rem;
    color: var(--text2);
    padding-left: 1.3rem;
  }

  .install-legend {
    display: flex;
    gap: 1.5rem;
    margin-bottom: 1rem;
    font-size: 0.75rem;
    color: var(--text2);
  }
  .install-legend span { display: flex; align-items: center; gap: 0.4rem; }

  /* ── KEYBOARD SHORTCUTS ── */
  .kb-section {
    margin-bottom: 2rem;
  }

  .kb-section-title {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 0.75rem;
    padding-bottom: 0.4rem;
    border-bottom: 1px solid var(--border);
  }

  .kb-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .kb-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg2);
    padding: 0.6rem 1rem;
    gap: 1rem;
    transition: background 0.12s;
  }

  .kb-row:hover { background: var(--bg3); }

  .kb-desc {
    font-size: 0.8rem;
    color: var(--text2);
    flex: 1;
  }

  .kb-keys {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    flex-shrink: 0;
  }

  .key {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-mono);
    font-size: 0.68rem;
    font-weight: 600;
    color: var(--text);
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-bottom: 2px solid var(--border2);
    border-radius: 5px;
    padding: 0.15rem 0.5rem;
    min-width: 24px;
    text-align: center;
    box-shadow: 0 1px 0 rgba(0,0,0,0.3);
  }

  .key-special { color: var(--green); border-color: rgba(0,255,135,0.25); }
  .key-plus { background: none; border: none; box-shadow: none; color: var(--text3); font-size: 0.6rem; min-width: auto; padding: 0; }

  main::-webkit-scrollbar { width: 4px; }
  main::-webkit-scrollbar-track { background: transparent; }
  main::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  main { scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }

  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    aside { display: none; }
    .grid { grid-template-columns: 1fr; }
    header { gap: 1rem; }
    .count-badge { display: none; }
    .header-actions { margin-left: 0; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">$_</div>
    <div class="logo-text">mac<span>OS</span> Terminal</div>
  </div>
  <div class="header-search">
    <span class="search-icon">⌕</span>
    <input type="text" id="searchInput" placeholder="Sök kommando eller beskrivning…" autocomplete="off">
  </div>
  <div class="header-actions">
    <div class="lang-switch" aria-label="Language switch">
      <button class="lang-btn active" id="langSvBtn" onclick="setLanguage('sv')">SV</button>
      <button class="lang-btn" id="langEnBtn" onclick="setLanguage('en')">EN</button>
    </div>
    <div class="count-badge"><span id="visibleCountLabel">Visar</span> <span id="visibleCount">0</span> <span id="visibleCountSuffix">kommandon</span></div>
  </div>
</header>

<div class="layout">
  <aside id="sidebar">
    <!-- generated by JS -->
  </aside>

  <main id="main">
    <!-- generated by JS -->
  </main>
</div>

<script>

    'vid', 'till', 'med', 'för', 'från', 'bara', 'alla', 'på', 'om', 'efter',
    'hela', 'specifik', 'specifikt', 'direkt', 'utan', 'över', 'under', 'när',
    'inte'
  ]);

  const escapeRegex = (value) => value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

  let result = text;
  replacements.forEach(([sv, en]) => {
    if (wholeWordReplacements.has(sv)) {
      result = result.replace(new RegExp(`\\b${escapeRegex(sv)}\\b`, 'g'), en);
    } else {
      result = result.split(sv).join(en);
    }
  });
  return result;
}

function translateText(text) {
  if (currentLang !== 'en' || !text) return text;
  return translateTextToEn(text);
}

function localizedText(value) {
  if (value && typeof value === 'object') {
    return value[currentLang] || value.sv || value.en || '';
  }
  return value;
}

function getCommandShort(c) {
  return currentLang === 'en' ? (c.shortEn || translateText(c.short)) : c.short;
}

function getExampleDesc(e) {
  return currentLang === 'en' ? (e.descEn || translateText(e.desc)) : e.desc;
}

function hydrateEnglishTranslations() {
  COMMANDS.forEach(cmd => {
    if (!cmd.shortEn) {
      cmd.shortEn = translateTextToEn(cmd.short);
    }
    (cmd.examples || []).forEach(example => {
      if (!example.descEn) {
        example.descEn = translateTextToEn(example.desc);
      }
    });
  });
}

hydrateEnglishTranslations();

  const text = el.innerText;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = `✓ ${t('copied')}`;
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = `⎘ ${t('copy')}`; btn.classList.remove('copied'); }, 2000);
  });
}

function filteredCommands() {
  return COMMANDS.filter(c => {
    const matchCat = activeCategory === 'Alla' || c.cat === activeCategory;
    const q = searchQuery.toLowerCase();
    const matchSearch = !q || c.cmd.toLowerCase().includes(q) || c.short.toLowerCase().includes(q) ||
      (c.shortEn||'').toLowerCase().includes(q) || translateText(c.short).toLowerCase().includes(q) ||
      (c.examples||[]).some(e => e.code.toLowerCase().includes(q) || e.desc.toLowerCase().includes(q) || (e.descEn||'').toLowerCase().includes(q) || translateText(e.desc).toLowerCase().includes(q));
    return matchCat && matchSearch;
  });
}

  document.getElementById('visibleCount').textContent = cmds.length;
  document.getElementById('visibleCountSuffix').textContent = commandCountText(cmds.length);

  if (cmds.length === 0) {
    main.innerHTML = `<div class="empty"><div class="big">◌</div>${t('noCommands')} "${searchQuery}"</div>`;
    return;
  }

  const groups = {};
  cmds.forEach(c => {
    if (!groups[c.cat]) groups[c.cat] = [];
    groups[c.cat].push(c);
  });

  let html = '';
  Object.entries(groups).forEach(([cat, cmds]) => {
    html += `<div class="section-header">
      <span class="section-title">${translateCategory(cat)}</span>
      <span class="section-sub">${cmds.length} ${commandCountText(cmds.length)}</span>
    </div>
    <div class="grid">`;

    cmds.forEach(c => {
      const exHtml = (c.examples||[]).map(e => {
        const exDesc = getExampleDesc(e);
        const isSep = exDesc.startsWith('──');
        const escaped = e.code.replace(/'/g, "\\'").replace(/"/g, '&quot;');
        if (isSep) {
          return `<div class="example-line is-separator">
            <div class="example-code-wrap">
              <span class="example-code">${e.code}</span>
              <button class="copy-btn" style="display:none">⎘</button>
            </div>
            <span class="example-desc">${exDesc}</span>
          </div>`;
        }
        return `<div class="example-line">
          <div class="example-code-wrap">
            <span class="example-code" title="${escaped}">${e.code}</span>
            <button class="copy-btn" onclick="copyCode(event, '${escaped}')" title="${t('copy')}">⎘</button>
          </div>
          <span class="example-desc">${exDesc}</span>
        </div>`;
      }).join('');

      html += `<div class="cmd-card" onclick="toggleCard(this)">
        <div class="cmd-top">
          <span class="cmd-name">${c.cmd}</span>
          <span class="cmd-short">${getCommandShort(c)}</span>
          <span class="cmd-expand-btn">▾</span>
        </div>
        <div class="cmd-detail">
          <div class="examples-label">${t('examples')}</div>
          ${exHtml}
          ${tagHtml(c.tags)}
        </div>
      </div>`;
    });

    html += '</div>';
  });

  main.innerHTML = html;
}

function toggleCard(el) {
  el.classList.toggle('expanded');
}

function copyCode(event, code) {
  event.stopPropagation();
  const wrap = event.currentTarget.closest('.example-code-wrap');
  const btn = event.currentTarget;
  navigator.clipboard.writeText(code).then(() => {
    wrap.classList.add('copied');
    btn.textContent = '✓';
    setTimeout(() => { wrap.classList.remove('copied'); btn.textContent = '⎘'; }, 1500);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = code; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    wrap.classList.add('copied'); btn.textContent = '✓';
    setTimeout(() => { wrap.classList.remove('copied'); btn.textContent = '⎘'; }, 1500);
  });
}

function setLanguage(lang) {
  currentLang = lang;
  localStorage.setItem('macTerminalGuideLang', lang);
  updateChrome();
  renderSidebar();
  renderMain();
}

function setView(view) {
  activeView = view;
  activeCategory = 'Alla';
  searchQuery = '';
  document.getElementById('searchInput').value = '';
  renderSidebar();
  renderMain();
  document.querySelector('main').scrollTop = 0;
}

function setCategory(cat) {
  activeView = 'commands';
  activeCategory = cat;
  renderSidebar();
  renderMain();
  document.querySelector('main').scrollTop = 0;
}

document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value;
  if (searchQuery) { activeView = 'commands'; activeCategory = 'Alla'; }
  renderSidebar();
  renderMain();
});

// Init
updateChrome();
renderSidebar();
renderMain();
</script>
</body>
</html>
